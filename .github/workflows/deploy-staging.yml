name: Deploy Staging

on:
  push:
    branches:
      - feat/portfolio-platform-2026
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: staging-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy-staging:
    name: Deploy portfolio-web to Vercel Preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Vercel CLI
        run: bun add -g vercel

      - name: Pull Vercel preview environment
        run: |
          vercel pull \
            --yes \
            --environment=preview \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build portfolio-web locally
        run: bun run build:portfolio

      - name: Deploy to Vercel Preview
        id: deploy
        run: |
          url=$(vercel deploy \
            --token=${{ secrets.VERCEL_TOKEN }})
          echo "Preview URL: $url"
          echo "url=$url" >> "$GITHUB_OUTPUT"
