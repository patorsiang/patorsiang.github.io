name: Deploy Staging

on:
  push:
    branches:
      - feat/portfolio-platform-2026
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: Deploy portfolio-web to Vercel Preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build portfolio-web
        run: bun run build:portfolio

      - name: Install Vercel CLI
        run: bun add -g vercel

      - name: Pull Vercel preview environment
        run: |
          vercel pull \
            --yes \
            --environment=preview \
            --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/portfolio-web

      - name: Build Vercel preview artifact
        run: |
          vercel build \
            --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/portfolio-web

      - name: Deploy to Vercel Preview
        id: deploy
        run: |
          url=$(vercel deploy \
            --prebuilt \
            --token=${{ secrets.VERCEL_TOKEN }})
          echo "Preview URL: $url"
          echo "url=$url" >> "$GITHUB_OUTPUT"
        working-directory: apps/portfolio-web
