# Build and deploy the legacy Next.js portfolio to GitHub Pages.
#
# The current production portfolio was moved from the repository root into legacy-v1
# as part of the 2026 Bun monorepo setup. This workflow intentionally deploys
# legacy-v1 until apps/portfolio-web is ready to replace it.

name: Deploy legacy portfolio to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    working-directory: legacy-v1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: legacy-v1/.next/cache
          key: ${{ runner.os }}-legacy-nextjs-${{ hashFiles('bun.lock', 'legacy-v1/package.json', 'legacy-v1/yarn.lock') }}-${{ hashFiles('legacy-v1/**/*.[jt]s', 'legacy-v1/**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-legacy-nextjs-${{ hashFiles('bun.lock', 'legacy-v1/package.json', 'legacy-v1/yarn.lock') }}-

      - name: Install dependencies
        working-directory: .
        run: bun install --frozen-lockfile

      - name: Build legacy Next.js app
        run: bun run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: legacy-v1/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
