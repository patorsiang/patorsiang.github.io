name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feat/portfolio-platform-2026

permissions:
  contents: read

jobs:
  verify:
    name: Verify Monorepo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Check formatting
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build
